<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CashiCoin</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Remixicons for Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background-color: var(--bg-body);
        }

        .dashboard-card {
            background: var(--bg-light);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
            animation: fadeUp 0.6s ease-out;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .dashboard-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }

        .dashboard-subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: var(--transition);
        }

        .logout-btn:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="dashboard-card">
            <i class="ri-checkbox-circle-fill success-icon"></i>
            <h1 class="dashboard-title">Welcome back!</h1>
            <p class="dashboard-subtitle">You have successfully logged into your CashiCoin account. Your dashboard is
                currently being set up.</p>

            <a href="index.html" class="logout-btn">
                <i class="ri-logout-box-r-line"></i> Log out
            </a>
        </div>
    </div>
</body>

</html>
