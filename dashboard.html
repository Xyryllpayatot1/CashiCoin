<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CashiCoin</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Remixicons for Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background-color: var(--bg-body);
        }

        .dashboard-card {
            background: var(--bg-light);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
            animation: fadeUp 0.6s ease-out;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .dashboard-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }

        .dashboard-subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: var(--transition);
        }

        .logout-btn:hover {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .dashboard-card {
                padding: 2rem 1.5rem;
            }

            .dashboard-title {
                font-size: 2rem;
            }

            .success-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>
    <header class="top-nav">
        <div class="nav-container">
            <a href="landing.html" class="nav-brand">
                CashiCoin<span>&lt;</span>
            </a>

            <!-- Desktop Nav -->
            <div class="nav-desktop">
                <nav class="nav-links">
                    <a href="get-started.html">
                        <i class="ri-money-dollar-circle-fill"></i>
                        <span>Get Started</span>
                    </a>
                    <a href="ways-to-earn.html">
                        <i class="ri-book-open-fill"></i>
                        <span>Guide</span>
                    </a>
                    <a href="support.html">
                        <i class="ri-chat-help-fill"></i>
                        <span>Support</span>
                    </a>
                </nav>

                <div class="nav-actions">
                    <a href="#" id="navLogoutDesktop" class="nav-btn btn-outline"
                        style="border-color: rgba(255,255,255,0.2);">Log out</a>
                </div>
            </div>

            <!-- Hamburger -->
            <button class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-back-btn" id="mobileBack">
                <i class="ri-arrow-left-line"></i> Back
            </div>
            <a href="get-started.html"><i class="ri-money-dollar-circle-fill"></i> Get Started</a>
            <a href="ways-to-earn.html"><i class="ri-book-open-fill"></i> Guide</a>
            <a href="support.html"><i class="ri-chat-help-fill"></i> Support</a>

            <div class="mobile-cta">
                <a href="#" id="navLogoutMobile" class="btn-outline">Log out</a>
            </div>
        </div>

        <div class="nav-overlay" id="navOverlay"></div>
    </header>

    <div class="dashboard-container main-content">
        <div class="dashboard-card" style="margin-top: 0;">
            <i class="ri-checkbox-circle-fill success-icon"></i>
            <h1 class="dashboard-title">Welcome back!</h1>
            <p id="loginMessage" class="dashboard-subtitle">Checking session...</p>

            <a href="#" id="logoutBtn" class="logout-btn">
                <i class="ri-logout-box-r-line"></i> Log out
            </a>

            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    const loggedInUser = sessionStorage.getItem('loggedInUser');
                    const userName = sessionStorage.getItem('userName');
                    const userPicture = sessionStorage.getItem('userPicture');
                    const loginMessage = document.getElementById('loginMessage');
                    const dashboardTitle = document.querySelector('.dashboard-title');
                    const icon = document.querySelector('.success-icon');

                    if (!loggedInUser) {
                        window.location.href = 'index.html';
                        return;
                    }

                    // Update UI with Google Profile if available
                    if (userName) {
                        dashboardTitle.textContent = `Welcome, ${userName}!`;
                    }

                    if (userPicture) {
                        icon.outerHTML = `<img src="${userPicture}" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 1.5rem; border: 3px solid var(--primary);">`;
                    }

                    // Display the requested message
                    loginMessage.innerHTML = `You're now logged in as: <strong>${loggedInUser}</strong>`;

                    // Combined Logout logic
                    const logoutAction = (e) => {
                        if (e) e.preventDefault();
                        sessionStorage.clear();
                        window.location.href = 'index.html';
                    };

                    document.getElementById('logoutBtn').addEventListener('click', logoutAction);
                    const navLogoutDesktop = document.getElementById('navLogoutDesktop');
                    const navLogoutMobile = document.getElementById('navLogoutMobile');
                    if (navLogoutDesktop) navLogoutDesktop.addEventListener('click', logoutAction);
                    if (navLogoutMobile) navLogoutMobile.addEventListener('click', logoutAction);

                    // Mobile Menu Logic
                    const navToggle = document.getElementById("navToggle");
                    const mobileMenu = document.getElementById("mobileMenu");
                    const navOverlay = document.getElementById("navOverlay");
                    const mobileBack = document.getElementById("mobileBack");

                    function closeMenu() {
                        if (navToggle) navToggle.classList.remove("active");
                        if (mobileMenu) mobileMenu.classList.remove("active");
                        if (navOverlay) navOverlay.classList.remove("active");
                    }

                    if (navToggle && mobileMenu && navOverlay) {
                        navToggle.addEventListener("click", () => {
                            navToggle.classList.toggle("active");
                            mobileMenu.classList.toggle("active");
                            navOverlay.classList.toggle("active");
                        });

                        navOverlay.addEventListener("click", closeMenu);
                        if (mobileBack) mobileBack.addEventListener("click", closeMenu);
                    }
                });
            </script>
        </div>
    </div>
</body>

</html>
