<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CashiCoin</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Remixicons for Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- SEO tags -->
    <meta name="description" content="Sign in to your account and start earning rewards today.">
</head>

<body>
    <header class="top-nav">
        <a href="landing.html" class="nav-brand" style="text-decoration: none; color: white;">
            <span class="brand-text">CashiCoin</span><span class="brand-arrow">&lt;</span>
        </a>
        <nav class="nav-links">
            <a href="get-started.html"><i class="ri-money-dollar-circle-fill"></i><span>Get Started</span></a>
            <a href="ways-to-earn.html"><i class="ri-add-circle-fill"></i><span>Ways to Earn</span></a>
            <a href="support.html"><i class="ri-question-answer-fill"></i><span>Support</span></a>
        </nav>
        <div class="nav-actions">
            <button class="nav-btn btn-primary">Sign Up</button>
            <button class="nav-btn btn-white">Login</button>
        </div>
    </header>

    <div class="main-content">
        <div class="left-panel">
            <div class="watermark">$</div>
            <div class="illustration-container">
                <img src="assets/kashkick_ninja_clean.png" alt="A cartoon ninja sitting on a cliff with flying coins"
                    class="hero-illustration" id="hero-img">
            </div>
        </div>
        <div class="right-panel">
            <div class="form-wrapper">
                <div class="form-brand-large">
                    <span class="brand-text">CashiCoin</span><span class="brand-arrow">&lt;</span>
                </div>

                <div class="social-login">
                    <button class="social-btn google" aria-label="Sign in with Google">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
                            alt="Google logo">
                        <span>Sign In with Google</span>
                    </button>
                    <button class="social-btn paypal" aria-label="Sign in with Paypal">
                        <i class="ri-paypal-fill" style="color: #00457C;"></i>
                        <span>Sign In with Paypal</span>
                    </button>
                    <button class="social-btn facebook" aria-label="Sign in with Facebook">
                        <i class="ri-facebook-circle-fill" style="color: #1877F2;"></i>
                        <span>Sign In with Facebook</span>
                    </button>
                </div>

                <div class="divider">
                    <span>Or</span>
                </div>

                <form id="loginForm" action="#" method="POST" class="login-form">
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group password-group">
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>

                    <button type="submit" class="signin-submit">Log In</button>

                    <div class="form-footer">
                        <div class="remember-me">
                            <label class="checkbox-container">
                                <input type="checkbox" id="remember">
                                <span class="checkmark"></span>
                                Stay logged in
                            </label>
                        </div>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        // Password toggle logic
        const togglePassword = document.querySelector('.toggle-password');
        const passwordInput = document.querySelector('#password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function (e) {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                // Toggle icon
                this.querySelector('i').classList.toggle('ri-eye-line');
                this.querySelector('i').classList.toggle('ri-eye-off-line');
            });
        }

        // Login form submission logic
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', function (e) {
                e.preventDefault();

                const submitBtn = this.querySelector('.signin-submit');

                // Simulate loading state
                submitBtn.textContent = 'Logging in...';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.7';
                submitBtn.style.cursor = 'not-allowed';

                // Simulate network request delay before redirect
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            });
        }
    </script>
</body>

</html>
